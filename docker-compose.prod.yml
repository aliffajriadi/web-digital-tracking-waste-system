services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: laravel_app_prod
    restart: always
    working_dir: /var/www
    volumes:
      - storage_prod:/var/www/storage
      - cache_prod:/var/www/bootstrap/cache
      - ./.env:/var/www/.env

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx_prod
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    volumes_from:
      - app
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: laravel_mysql_prod
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data_prod:/var/lib/mysql

# DAFTARKAN SEMUA NAMED VOLUMES DI SINI
volumes:
  mysql_data_prod:
  storage_prod:
  cache_prod: